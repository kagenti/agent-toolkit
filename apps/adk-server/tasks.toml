# fix

["adk-server:fix"]
depends = ["adk-server:fix:*"]

["adk-server:fix:ruff-check"]
extends = "python:fix:ruff"
depends = ["adk-server:setup"]
dir = "{{config_root}}/apps/adk-server"

["adk-server:fix:ruff-format"]
extends = "python:fix:ruff-format"
depends = ["adk-server:setup"]
dir = "{{config_root}}/apps/adk-server"

["adk-server:fix:docs"]
description = "Regenerate docs/development/api-reference/openapi.json from server routes (no running server needed)"
depends = ["adk-server:setup"]
dir = "{{config_root}}/apps/adk-server"
run = '''
uv run python -c "
import json, sys
from fastapi import FastAPI
from fastapi.openapi.utils import get_openapi
from adk_server.application import mount_routes, get_version
app = FastAPI(docs_url=None, openapi_url=None)
mount_routes(app)
spec = get_openapi(title='ADK server', version=get_version(), routes=app.routes)
spec.pop('servers', None)
print(json.dumps(spec, indent=2))
" > ../../docs/development/api-reference/openapi.json
'''

# run

["adk-server:run"]
depends = ["adk-server:setup"]
dir = "{{config_root}}/apps/adk-server"
run = "uv run adk-server"

# build

["adk-server:build"]
depends = ["adk-server:build:*"]
dir = "{{config_root}}/apps/adk-server"
run = "docker build -t ghcr.io/kagenti/adk/adk-server:local --load ."

["adk-server:build:requirements"]
depends = ["adk-server:setup"]
dir = "{{config_root}}/apps/adk-server"
run = "mkdir -p dist && uv export --no-hashes --no-emit-workspace --no-dev --format requirements-txt > dist/requirements.txt"
sources = ["uv.lock"]
outputs = ["dist/requirements.txt"]

["adk-server:build:sdist"]
depends = ["adk-server:setup"]
dir = "{{config_root}}/apps/adk-server"
run = "rm ./dist/*.tar.gz 2>/dev/null || true; uv build --sdist --out-dir dist"
sources = ["pyproject.toml", "uv.lock", "src/**/*.py"]
outputs = ["dist/*.tar.gz"]

# migrations

["adk-server:migrations:run"]
dir = "{{config_root}}/apps/adk-server"
run = "uv run migrate"

["adk-server:migrations:alembic:nocheck"]
dir = "{{config_root}}/apps/adk-server"
usage = 'arg "[alembic_vars]..."'
run = """
#!/bin/bash
set -a
source .env
set +a

cd src/adk_server/infrastructure/persistence/migrations
eval "alembic_vars=(${usage_alembic_vars})"
uv run alembic "${alembic_vars[@]}"
"""

["adk-server:migrations:alembic"]
dir = "{{config_root}}/apps/adk-server"
usage = 'arg "[alembic_vars]..."'
run = """
#!/bin/bash
set -a
source .env
set +a

if ! telepresence list --replacements 2>/dev/null | grep -q adk; then
    echo "Dev env not running, use 'mise run adk-server:dev:start' to start it..."
    exit 1
fi

cd src/adk_server/infrastructure/persistence/migrations
eval "alembic_vars=(${usage_alembic_vars})"
uv run alembic "${alembic_vars[@]}"
"""

["adk-server:migrations:generate"]
dir = "{{config_root}}/apps/adk-server"
usage = 'arg "<message>"'
run = "{{ mise_bin }} run adk-server:migrations:alembic revision --autogenerate --message \"${usage_message}\""

# dev

["adk-server:dev:shell"]
dir = "{{config_root}}/apps/adk-server"
run = "{{ mise_bin }} run adk:shell --vm-name=adk-local-dev"

["adk-server:dev:start"]
dir = "{{config_root}}/apps/adk-server"
usage = '''
flag "--vm-name <vm_name>" default="adk-local-dev"
arg "[cli_args]..."
'''
run = """
#!/bin/bash

set -e
VM_NAME="${usage_vm_name?}"
eval "$( {{ mise_bin }} run adk:shell --vm-name="$VM_NAME" )"
{{ mise_bin }} run adk-server:dev:disconnect --vm-name="$VM_NAME"
{{ mise_bin }} run adk:stop-all --except "$VM_NAME"
eval "cli_args=(${usage_cli_args})"
export SKIP_PULL
{{ mise_bin }} adk:start --vm-name="$VM_NAME" \
    --no-wait-for-platform \
    "${cli_args[@]}"
{{ mise_bin }} run adk-server:dev:connect --vm-name="$VM_NAME"
"""

["adk-server:dev:reload"]
dir = "{{config_root}}/apps/adk-server"
usage = '''
arg "[cli_args]..."
'''
run = """
#!/bin/bash
eval "cli_args=(${usage_cli_args})"
{{ mise_bin }} run --force helm:build
{{ mise_bin }} run --force adk-cli:build:copy-helm-chart
SKIP_PULL=true {{ mise_bin }} run adk-server:dev:start "${cli_args[@]}"
"""

["adk-server:dev:stop"]
dir = "{{config_root}}/apps/adk-server"
usage = 'flag "--vm-name <vm_name>" default="adk-local-dev"'
run = """
#!/bin/bash
VM_NAME="${usage_vm_name?}"
{{ mise_bin }} run adk-server:dev:disconnect --vm-name="$VM_NAME"
{{ mise_bin }} run adk:stop --vm-name="$VM_NAME"
"""

["adk-server:dev:delete"]
dir = "{{config_root}}/apps/adk-server"
usage = 'flag "--vm-name <vm_name>" default="adk-local-dev"'
run = """
VM_NAME="${usage_vm_name?}"
{{ mise_bin }} run adk-cli:run -- platform delete --vm-name="$VM_NAME"
"""

["adk-server:dev:connect"]
dir = "{{config_root}}/apps/adk-server"
usage = 'flag "--vm-name <vm_name>" default="adk-local-dev"'
run = """
#!/bin/bash
NAMESPACE=kagenti-adk
VM_NAME="${usage_vm_name?}"
eval "$( {{ mise_bin }} run adk:shell --vm-name="$VM_NAME" )"

# MicroShift/OpenShift specific setup for Telepresence
kubectl create namespace ambassador --dry-run=client -o yaml | kubectl apply -f -
kubectl label namespace ambassador pod-security.kubernetes.io/enforce=privileged --overwrite
kubectl label namespace ambassador pod-security.kubernetes.io/warn=privileged --overwrite
kubectl label namespace ambassador pod-security.kubernetes.io/audit=privileged --overwrite
# Allow privileged pods in the workload namespace so the traffic-agent sidecar can be injected
kubectl label namespace "$NAMESPACE" pod-security.kubernetes.io/enforce=privileged --overwrite
kubectl label namespace "$NAMESPACE" pod-security.kubernetes.io/warn=privileged --overwrite
kubectl label namespace "$NAMESPACE" pod-security.kubernetes.io/audit=privileged --overwrite
# Grant privileged SCC to the deployment SA so Telepresence traffic-agent sidecar can be injected
SA=$(kubectl get deploy adk-server -n "$NAMESPACE" -o jsonpath='{.spec.template.spec.serviceAccountName}')
SA="${SA:-default}"
SCC_USER="system:serviceaccount:${NAMESPACE}:${SA}"
echo "Granting privileged SCC to SA: ${SCC_USER}"
if ! kubectl get scc privileged -o jsonpath='{.users}' | grep -q "$SCC_USER"; then
    kubectl get scc privileged -o json | jq --arg user "$SCC_USER" '.users = ((.users // []) + [$user] | unique)' | kubectl replace -f -
fi

# Create telepresence values file to handle MicroShift restricted SCC
TP_VALUES=$(mktemp)
cat > "$TP_VALUES" <<EOF
podSecurityContext: {}
securityContext:
  runAsUser: null
  runAsNonRoot: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  readOnlyRootFilesystem: true
agent:
  securityContext:
    runAsNonRoot: false
    allowPrivilegeEscalation: true
EOF

tele="telepresence --use .*${NAMESPACE}.*"
$tele helm upgrade --values "$TP_VALUES" || $tele helm install --values "$TP_VALUES" || true
rm "$TP_VALUES"
$tele connect --namespace "$NAMESPACE"
$tele replace adk-server --port 18333:8333
"""

["adk-server:dev:disconnect"]
dir = "{{config_root}}/apps/adk-server"
usage = 'flag "--vm-name <vm_name>" default="adk-local-dev"'
run = """
#!/bin/bash
NAMESPACE=kagenti-adk
VM_NAME="${usage_vm_name?}"
eval "$( {{ mise_bin }} run adk:shell --vm-name="$VM_NAME" )"

tele="telepresence --use .*${NAMESPACE}.*"
if ! ($tele status --output json | jq '.user_daemon.status' | grep -q "Not connected"); then
    $tele uninstall --all-agents || true
fi
$tele quit
"""

["adk-server:dev:reconnect"]
dir = "{{config_root}}/apps/adk-server"
usage = 'flag "--vm-name <vm_name>" default="adk-local-dev"'
run = """
VM_NAME="${usage_vm_name?}"
{{ mise_bin }} run adk-server:dev:disconnect --vm-name="$VM_NAME"
{{ mise_bin }} run adk-server:dev:connect --vm-name="$VM_NAME"
"""

["adk-server:test:unit"]
dir = "{{config_root}}/apps/adk-server"
run = "uv run pytest -m unit"

["adk-server:test:e2e"]
dir = "{{config_root}}/apps/adk-server"
raw = true
usage = '''
flag "--no-clean"
flag "--only <only>"
'''
run = """
#!/bin/bash
set -euxo pipefail

VM_NAME=e2e-test-run

export KAGENTI_ADK_USERNAME=admin
export KAGENTI_ADK_PASSWORD=admin
export KAGENTI_ADK_CLIENT_ID=kagenti-cli

NO_CLEAN="${usage_no_clean:-false}"
if [ "$NO_CLEAN" != "true" ]; then
    {{ mise_bin }} run adk:stop-all
    {{ mise_bin }} run adk:delete --vm-name=${VM_NAME} || true
    curl http://adk-api.localtest.me:8080 >/dev/null 2>&1 && echo "Another instance at adk-api.localtest.me:8080 is already running" && exit 2
fi

CONFIG_FILE="/tmp/config_e2e_test_$(date +%s).yaml"

echo '
adk:
  ui:
    enabled: true
  docling:
    enabled: true
' > "$CONFIG_FILE"

{{ mise_bin }} run adk:start -v --vm-name=${VM_NAME} --skip-login -f "$CONFIG_FILE"

eval "$( {{ mise_bin }} run adk:shell --vm-name="$VM_NAME" )"

if [ -z "${TEST_AGENT_IMAGE:-}" ]; then
    echo "Building test agent..."
    TEST_AGENT_IMAGE=registry.cr-system.svc.cluster.local:5000/chat-test:latest
    {{ mise_bin }} run adk-cli:run -- build -v "${PWD}/../.." --dockerfile "${PWD}/../../agents/chat/Dockerfile" --tag ${TEST_AGENT_IMAGE} --vm-name=${VM_NAME}
fi
export TEST_AGENT_IMAGE

export DB_URL="postgresql+asyncpg://adk-user:password@localhost:5432/adk"
export LLM_API_BASE="${LLM_API_BASE:-http://host.docker.internal:11434/v1}"

kubectl port-forward -n kagenti-adk svc/postgresql 5432:5432 2>/dev/null 1>&2 &
uv run pytest -m e2e --ignore=tests/e2e/examples
result=$?

if [ $result -ne 0 ]; then
    echo "Tests failed. Checking pod status..."
    echo "------------- pods --------------"
    kubectl get pod
    echo "------------ events -------------"
    kubectl get event
fi

if [ "$NO_CLEAN" != "true" ]; then
    {{ mise_bin }} run adk-cli:run -- platform delete --vm-name=${VM_NAME}
else
    {{ mise_bin }} run adk-cli:run -- platform stop --vm-name=${VM_NAME}
fi

rm -f "$CONFIG_FILE"

kill %1
exit $result
"""

["adk-server:test:e2e-examples"]
dir = "{{config_root}}/apps/adk-server"
raw = true
usage = 'flag "--no-clean"'
run = """
#!/bin/bash
VM_NAME=e2e-examples-test-run

export KAGENTI_ADK_USERNAME=admin
export KAGENTI_ADK_PASSWORD=admin
export KAGENTI_ADK_CLIENT_ID=kagenti-cli

NO_CLEAN="${usage_no_clean:-false}"
if [ "$NO_CLEAN" != "true" ]; then
    {{ mise_bin }} run adk:stop-all
    {{ mise_bin }} run adk:delete --vm-name=${VM_NAME}
    curl http://kagenti-api.localtest.me:8080 >/dev/null 2>&1 && echo "Another instance at kagenti-api.localtest.me:8080 is already running" && exit 2
fi

CONFIG_FILE="/tmp/config_e2e_test_$(date +%s).yaml"

echo '
adk:
  ui:
    enabled: false
  docling:
    enabled: true
' > "$CONFIG_FILE"

{{ mise_bin }} run adk:start --vm-name=${VM_NAME} --skip-login -f "$CONFIG_FILE"


eval "$( {{ mise_bin }} run adk:shell --vm-name="$VM_NAME" )"

export DB_URL="postgresql+asyncpg://adk-user:password@localhost:5432/adk"
export LLM_API_BASE="${LLM_API_BASE:-http://host.docker.internal:11434/v1}"

echo "Waiting for adk-server deployment to be ready..."
kubectl wait --for=condition=available --timeout=300s deployment/adk-server

echo "Waiting for Keycloak provision job to complete..."
kubectl wait --for=condition=complete --timeout=300s job/keycloak-provision

kubectl port-forward svc/postgresql 5432:5432 2>/dev/null 1>&2 &
uv run pytest -m e2e tests/e2e/examples
result=$?

if [ $result -ne 0 ]; then
    echo "Tests failed. Checking pod status..."
    echo "------------- pods --------------"
    kubectl get pod
    echo "------------ events -------------"
    kubectl get event
fi

if [ "$NO_CLEAN" != "true" ]; then
    {{ mise_bin }} run adk-cli:run -- platform delete --vm-name=${VM_NAME}
else
    {{ mise_bin }} run adk-cli:run -- platform stop --vm-name=${VM_NAME}
fi

rm -f "$CONFIG_FILE"

kill %1
exit $result
"""

["adk-server:test:integration"]
dir = "{{config_root}}/apps/adk-server"
raw = true
run = """
#!/bin/bash
set -euxo pipefail
VM_NAME=integration-test-run

# {{ mise_bin }} run adk:delete --vm-name="$VM_NAME"

{{ mise_bin }} run adk:start \
    --vm-name="$VM_NAME" \
    --set kagenti-adk:redis.enabled=true \
    --set kagenti-adk:ui.enabled=false

eval "$( {{ mise_bin }} run adk:shell --vm-name="$VM_NAME" )"

{{ mise_bin }} run adk-server:dev:disconnect --vm-name="$VM_NAME"
{{ mise_bin }} run adk-server:dev:connect --vm-name="$VM_NAME"

uv run pytest -m integration
"""

{{-  if .Values.ui.enabled -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adk-ui
  labels:
    app: adk-ui
    {{- include "kagenti-adk.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ui.replicaCount }}
  selector:
    matchLabels:
      app: adk-ui
      {{- include "kagenti-adk.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
      {{- with .Values.ui.podAnnotations }}
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        app: adk-ui
        {{- include "kagenti-adk.labels" . | nindent 8 }}
        {{- with .Values.ui.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- include "kagenti-adk.imagePullSecrets" . | nindent 6 }}
      {{- with .Values.ui.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: adk-ui
          {{- with .Values.ui.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.ui.image.repository }}:{{ .Values.ui.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8334
              protocol: TCP
          {{- with .Values.ui.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.ui.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.ui.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            - name: LOCAL_DEV_AUTO_LOGIN
              value: {{ .Values.features.uiLocalDevAutoLogin | quote }}
            - name: API_URL
              value: "http://adk-server-svc:{{.Values.server.service.port}}"
            - name: APP_NAME
              value: {{ .Values.ui.appName | quote }}
            - name: FEATURE_FLAGS
              value: |
                {
                  "LocalSetup": {{ .Values.features.uiLocalSetup }},
                  "Connectors": {{ .Values.features.uiConnectors }},
                  "Providers": {{ .Values.features.uiProviders }},
                  "Variables": {{ .Values.features.uiVariables }}
                }
            - name: CONTEXT_TOKEN_PERMISSIONS
              value: {{ toJson .Values.contextTokenPermissions | quote }}
            - name: TRUST_PROXY_HEADERS
              value: {{ .Values.trustProxyHeaders | quote }}
          {{- if .Values.auth.enabled }}
            - name: NEXTAUTH_URL
              value: {{ .Values.auth.nextauthUrl }}
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  key: authSecret
                  name: adk-ui-secret
            - name: OIDC_ENABLED
              value: "true"
            - name: OIDC_PROVIDER_NAME
              value: {{ include "kagenti-adk.oidc.providerName" . | quote }}
            - name: OIDC_PROVIDER_ID
              value: {{ include "kagenti-adk.oidc.providerId" . | quote }}
            - name: OIDC_PROVIDER_CLIENT_ID
              value: {{ include "kagenti-adk.oidc.uiClientId" . | quote }}
            - name: OIDC_PROVIDER_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: {{ include "kagenti-adk.oidc.uiClientSecretKey" . }}
                  name: {{ include "kagenti-adk.oidc.uiClientSecretName" . }}
            - name: OIDC_PROVIDER_ISSUER
              value: {{ include "kagenti-adk.oidc.internalIssuerUrl" . | quote }}
            - name: OIDC_PROVIDER_EXTERNAL_ISSUER
              value: {{ include "kagenti-adk.oidc.publicIssuerUrl" . | quote }}
            - name: OIDC_KEYCLOAK_LOGOUT
              value: "true"
          {{- else}}
            - name: OIDC_ENABLED
              value: "false"
          {{- end }}
          volumeMounts:
            {{- with .Values.ui.volumeMounts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        {{- with .Values.ui.volumes }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.ui.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ui.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}

  # auths:
  #   "github.com":
  #     type: "pat"
  #     token: "ghp_xxxxxxxxxxxxxxxxxxxx"
  #   "github.enterprise.com":
  #     type: "app"
  #     app_id: 123456
  #     installation_id: 789012
  #     private_key: |
  #       -----BEGIN RSA PRIVATE KEY-----
  #       MIIEpAIBAAKCAQEA...
  #       -----END RSA PRIVATE KEY-----

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []

# -------- SERVER ----------
server:
  image:
    repository: ghcr.io/kagenti/adk/adk-server
    pullPolicy: IfNotPresent
    # Overrides the image tag whose default is the chart appVersion.
    tag: null

  replicaCount: 1

  podAnnotations: {}
  podLabels: {}

  podSecurityContext: {}
  # fsGroup: 2000

  securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

  initContainers:
    createVectorDbExtension: true

  service:
    type: ClusterIP
    port: 8333
    nodePort: 8333

  resources:
    requests:
      memory: 300Mi
  #   cpu: 100m
  # limits:
  #   memory: 300Mi
  #   cpu: 100m

  ingress:
    enabled: false
    className: ""
    annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
    hosts:
      - host: chart-example.local
        paths:
          - path: /
            pathType: ImplementationSpecific
    tls: []
    #  - secretName: chart-example-tls
    #    hosts:
    #      - chart-example.local

  livenessProbe:
    httpGet:
      path: /healthcheck
      port: http
    initialDelaySeconds: 5
    failureThreshold: 5
    periodSeconds: 30
  readinessProbe:
    httpGet:
      path: /healthcheck
      port: http
    initialDelaySeconds: 5
    failureThreshold: 20
    periodSeconds: 5

  volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

  volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

  nodeSelector: {}
  tolerations: []
  affinity: {}

  # Uvicorn --timeout-keep-alive (in seconds)
  uvicornTimeoutKeepAlive: 5

  cors:
    enabled: false
    allowOrigins: []
    # - http://localhost:3000
    # - https://my-ui.example.com
    allowOriginRegex: ""
    allowMethods:
      - "*"
    allowHeaders:
      - "*"
    allowCredentials: false

  rateLimit:
    enabled: false
    globalLimits:
      - "20/second"
      - "100/minute"
    strategy: "sliding-window-counter"
    roleBasedLimits:
      user:
        openai_chat_completion_tokens: []
        # - "100000/minute"
        openai_chat_completion_requests: []
        # - "100/minute"
        openai_embedding_inputs: []
        # - "1000/minute"
      developer:
        openai_chat_completion_tokens: []
        openai_chat_completion_requests: []
        openai_embedding_inputs: []
      admin:
        openai_chat_completion_tokens: []
        openai_chat_completion_requests: []
        openai_embedding_inputs: []


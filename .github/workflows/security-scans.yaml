  # CodeQL Analysis is configured via GitHub repo settings (default setup)
  # with the "extended" query suite covering python, javascript-typescript, and actions.

  action-pinning:
    name: Verify Action Pinning
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6

      - name: Check for unpinned GitHub Actions
        run: |
          echo "=== Checking for unpinned GitHub Actions ==="
          echo ""
          echo "Pinning to SHAs prevents supply chain attacks."
          echo "See: https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions#using-third-party-actions"
          echo ""

          UNPINNED=$(grep -rh "uses:" .github/workflows/ | grep -v "#" | grep -v "^\s*echo " | grep -E "@v[0-9]|@main|@master" | sort -u || true)

          if [ -n "$UNPINNED" ]; then
            echo "::warning::Found actions not pinned to SHA commits:"
            echo ""
            echo "$UNPINNED"
            echo ""
            echo "To pin an action, replace:"
            echo "  uses: actions/checkout@v6"
            echo "With:"
            echo "  uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6"
            exit 1
          else
            echo "All actions are properly SHA-pinned."
          fi

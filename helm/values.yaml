# Default values for adk.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

# Global Helm hooks configuration
# If true, creating/updating resources will use Helm hooks (post-install, post-upgrade, etc.)
# If false, resources will be created as standard Kubernetes resources
useHelmHooks: true

# Local storage configuration for single-node development environments
# When true, creates hostPath-backed PersistentVolumes for PostgreSQL, SeaweedFS,
# kagenti Keycloak Postgres, and Phoenix instead of relying on dynamic provisioning
# WARNING: Only use for local development. Data is stored on the node's filesystem.
localStorage: false

# Gateway API HTTPRoute configuration for local development
# When enabled, creates HTTPRoutes for ADK UI and API through a shared gateway
# Hostnames are derived from auth.nextauthUrl and auth.apiUrl
gateway:
  enabled: false
  parentRef:
    name: http
    namespace: kagenti-system

features:
  # UI only features
  uiLocalSetup: false
  uiConnectors: false
  uiVariables: true
  uiProviders: false

# How long task_id and context_id ownership will be tracked
#   Performance considerations: all context IDs are recorded for this period
#   Security Considerations:
#     Agents should clear all local state stored under context_id within this time period
#     No security implication for task_id (tasks ids can be generated only server-side in the agent)
#   If <= 0, request expiration is disabled, records will grow indefinitely in database (needs manual cleanup)
a2aProxyRequestsExpireAfterDays: 14

# Context resource expiration
#   Includes entities bound to context (=conversation) like files, vector stores, etc.
#   If <= 0, context expiration is disabled, resources are deleted when context is deleted
contextResourcesExpireAfterDays: 0

# Prompt template for generating conversation titles (Jinja2 format)
generateConversationTitle:
  enabled: true
  model: default
  # You can use the following variables in prompt:
  # - text: all text parts of the user message concatenated
  # - files: list of files attached to the user message
  # - titleHint: hint for the title extracted from DataPart
  # - rawMessage: entire user message object, WARNING: may contain secrets in metadata, be careful not to send them to the LLM

  prompt: |
    YOUR INSTRUCTIONS:
    Write a short descriptive title for the conversation (max 100 characters).
    Return only the title verbatim with no commentary or explanation.
    Do not use markdown or any formatting.
    Do not use emojis.
    Do not use code blocks.
    The title should be plain text only.

    CONVERSATION CONTENT:
    ```
    {% if titleHint %}
    Title hint:
    {{ titleHint }}
    {% endif %}

    User message:
    {{ text }}

    {% if files %}
    Attached files:
    {% for file in files %}
    - {{ file.name or 'Unnamed file' }}{% if file.mimeType %} ({{ file.mimeType }}){% endif %}
    {% endfor %}
    {% endif %}
    ```

contextTokenPermissions:
  grant_global_permissions:
    files: []
    feedback: []
    vector_stores: []
    llm: ["*"]
    embeddings: ["*"]
    model_providers: []
    a2a_proxy: ["*"]
    providers: []
    provider_variables: []
    contexts: []
    context_data: []
    connectors: []
  grant_context_permissions:
    files: ["*"]
    vector_stores: ["*"]
    context_data: ["*"]

defaultLLMModel: ""
defaultEmbeddingModel: ""
modelProviders: []
# Example:
# - name: "OpenAI"
#   type: "openai"
#   base_url: "https://api.openai.com/v1"
#   api_key: "sk-..."

# Kagenti integration - sync agents from kagenti API as providers
kagenti:
  enabled: true
  apiUrl: "http://kagenti-backend.kagenti-system.svc.cluster.local:8000"
  namespaces:
    - team1

# ------- SECURITY ---------

encryptionKey: ""
auth:
  enabled: true # Warning, disable only for local deployments
  basic:
    enabled: true # Disable basic auth for enhanced security

  jwtPrivateKey: "" # If empty, a key pair will be auto-generated
  jwtPublicKey: "" # If empty, a key pair will be auto-generated

  validateAudience: true

  # Next.js settings, make sure to change nextauthUrl
  nextauthSecret: "" # If empty, a random string will be generated

  # These are important for audience validation, make sure to change them to your public URLs
  nextauthUrl: "http://adk.localtest.me:8080"
  nextauthDevUrl: ""
  apiUrl: "http://adk-api.localtest.me:8080"

  ## Keycloak provisioning job configuration
  ## Keycloak itself is deployed externally (e.g. via kagenti-deps).
  ## This job sets up the adk realm, clients, and seed users.
  keycloakProvisionJob:
    enabled: true
    adminUser: admin
    # a random password will be generated if empty, you can get it using
    # kubectl get secret keycloak-secret -o jsonpath="{.data.admin-password}" | base64 -d
    adminPassword: ""
    seedUsers:
      # - username: admin
      #   password: admin
      #   firstName: Admin
      #   lastName: User
      #   email: admin@beeai.dev
      #   roles: ["adk-admin"]
      #   enabled: true
    image:
      repository: quay.io/keycloak/keycloak
      tag: 26.3.3
      pullPolicy: IfNotPresent

  ## OIDC Provider Configuration
  ## @param auth.oidcProvider.issuerUrl OIDC issuer URL (internal, used by server for token validation)
  ## @param auth.oidcProvider.publicIssuerUrl Public OIDC issuer URL (if different from issuerUrl)
  ## @param auth.oidcProvider.name Display name of the provider
  ## @param auth.oidcProvider.id ID of the provider (used for internal references)
  ## @param auth.oidcProvider.rolesPath JSON path to roles in JWT claims
  ## @param auth.oidcProvider.uiClientId Client ID for UI
  ## @param auth.oidcProvider.uiClientSecret Client Secret for UI
  ## @param auth.oidcProvider.uiClientSecretKey Key in existing secret for UI Client Secret
  ## @param auth.oidcProvider.serverClientId Client ID for Server
  ## @param auth.oidcProvider.serverClientSecret Client Secret for Server
  ## @param auth.oidcProvider.serverClientSecretKey Key in existing secret for Server Client Secret
  ## @param auth.oidcProvider.existingSecret Name of existing secret containing client secrets
  oidcProvider:
    issuerUrl: ""
    publicIssuerUrl: "" # If empty, defaults to issuerUrl. Set when internal and public URLs differ.
    name: "Keycloak"
    id: "keycloak"
    rolesPath: "realm_access.roles" # JSON path to roles in JWT claims (can be an array or a semicolon separated string)
    uiClientId: "adk-ui"
    uiClientSecret: ""
    uiClientSecretKey: "uiClientSecret"
    serverClientId: "adk-server"
    serverClientSecret: ""
    serverClientSecretKey: "serverClientSecret"
    existingSecret: ""

# In adk-server this is used to determine the request origin and dynamically create agent card.
# For example https://adk.example.com/api/v1/providers/{provider_id} will return an agent cart with URL for
# https://adk.example.com, without respecting the headers, the URL would be "http://adk.example.com",
# See https://www.uvicorn.org/settings/#application-interface
trustProxyHeaders: false

# --- EXTERNAL REGISTRIES ---
# GitHub configuration for accessing private repositories
# This creates a .githubconfigjson file in the adk-secret
github:
  auths: {}

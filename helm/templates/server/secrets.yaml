{{- $jwtPrivateKey := .Values.auth.jwtPrivateKey -}}
{{- $jwtPublicKey := .Values.auth.jwtPublicKey -}}

{{- if and (empty $jwtPrivateKey) (empty $jwtPublicKey) -}}
  {{- $secret := (lookup "v1" "Secret" .Release.Namespace "adk-secret") -}}
  {{- if and $secret $secret.data -}}
    {{- if and (hasKey $secret.data "jwtPrivateKey") (hasKey $secret.data "jwtPublicKey") -}}
      {{- $jwtPrivateKey = index $secret.data "jwtPrivateKey" | b64dec -}}
      {{- $jwtPublicKey = index $secret.data "jwtPublicKey" | b64dec -}}
    {{- end -}}
  {{- end -}}

  {{- if and (empty $jwtPrivateKey) (empty $jwtPublicKey) -}}
    {{- $gen := genSelfSignedCert "adk-jwt" nil nil 3650 -}}
    {{- $jwtPrivateKey = $gen.Key -}}
    {{- $jwtPublicKey = $gen.Cert -}}
  {{- end -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: "adk-secret"
  labels:
    app: adk-server
    {{- include "kagenti-adk.labels" . | nindent 4 }}
type: Opaque

data:
  encryptionKey: {{ .Values.encryptionKey | b64enc | quote }}
  sqlConnection: {{ printf "postgresql+asyncpg://%s:%s@%s:%s/%s"
       (include "kagenti-adk.databaseUser" .)
       (include "kagenti-adk.databasePassword" .)
       (include "kagenti-adk.databaseHost" .)
       (include "kagenti-adk.databasePort" .)
       (include "kagenti-adk.databaseName" .)
       | b64enc | quote
  }}
  {{- if or .Values.postgresql.enabled (and (not .Values.postgresql.enabled) .Values.externalDatabase.adminUser .Values.externalDatabase.adminPassword) }}
  sqlConnectionSuperuser: {{ printf "postgresql+asyncpg://%s:%s@%s:%s/%s"
       (include "kagenti-adk.databaseAdminUser" .)
       (include "kagenti-adk.databaseAdminPassword" .)
       (include "kagenti-adk.databaseHost" .)
       (include "kagenti-adk.databasePort" .)
       (include "kagenti-adk.databaseName" .)
       | b64enc | quote
  }}
  {{- end }}
  jwtPrivateKey: {{ $jwtPrivateKey | b64enc | quote }}
  jwtPublicKey: {{ $jwtPublicKey | b64enc | quote }}
  s3AccessKeyId: {{ include "kagenti-adk.s3.accessKeyID" . | b64enc | quote }}
  s3AccessKeySecret: {{ include "kagenti-adk.s3.accessKeySecret" . | b64enc | quote }}
  {{- if .Values.github.auths }}
  .githubconfigjson: {{ .Values.github | toJson | b64enc | quote }}
  {{- end }}
  {{- if and (include "kagenti-adk.databaseSslEnabled" .) .Values.externalDatabase.sslRootCert }}
  sslRootCert: {{ .Values.externalDatabase.sslRootCert | b64enc | quote }}
  {{- end }}
  {{- if not .Values.auth.oidcProvider.existingSecret }}
  {{- $serverClientSecret := include "kagenti-adk.oidc.serverClientSecretValue" . }}
  adkServerClientSecret: {{ $serverClientSecret | b64enc | quote }}
  {{- end }}
---
{{- $root := . }}
apiVersion: v1
kind: Secret
metadata:
  name: adk-providers-secret
type: Opaque
stringData:
  model_providers_registry.yaml: |
    {{- if .Values.modelProviders }}
    providers:
      {{- range $idx, $p := $root.Values.modelProviders }}
      - {{ $p | toYaml | nindent 8 | trim }}
      {{- end }}
    {{- else }}
    providers: [ ]
    {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: adk-connectors-secret
type: Opaque
stringData:
  presets.json: |
    {{ .Values.connector.presets | toJson | indent 4 }}

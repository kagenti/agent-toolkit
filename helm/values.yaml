# ----- INFRASTRUCTURE ------

## PostgreSQL chart configuration
## ref: https://github.com/CloudPirates-io/helm-charts/tree/main/charts/postgres
## @param postgresql.enabled Switch to enable or disable the PostgreSQL helm chart
## @param postgresql.auth.username Name for the admin user (POSTGRES_USER)
## @param postgresql.auth.password Password for the admin user (POSTGRES_PASSWORD)
## @param postgresql.auth.database Name for the default database (POSTGRES_DB)
## @param postgresql.customUser.name Name for an additional application user
## @param postgresql.customUser.password Password for the application user
## @param postgresql.customUser.database Database for the application user
##
postgresql:
  enabled: true
  fullnameOverride: "postgresql"
  image:
    registry: mirror.gcr.io
    repository: pgvector/pgvector
    tag: pg17
  auth:
    username: adk-user
    password: "password"
    database: adk
  persistence:
    size: 4Gi
## External PostgreSQL configuration
## All of these values are only used when postgresql.enabled is set to false
## @param externalDatabase.host Database host (ignored if externalDatabase.sqlConnection is set)
## @param externalDatabase.port Database port number (ignored if externalDatabase.sqlConnection is set)
## @param externalDatabase.user Non-root username for ADK (ignored if externalDatabase.sqlConnection is set)
## @param externalDatabase.password Password for the non-root username for ADK (ignored if externalDatabase.sqlConnection or externalDatabase.existingSecret are set)
## @param externalDatabase.database ADK database name (ignored if externalDatabase.sqlConnection is set)
## @param externalDatabase.existingSecret Name of an existing secret resource containing the database credentials
##
externalDatabase:
  host: ""
  port: 5432
  user: adk-user
  database: adk
  password: ""
  # Required when initContainers.createVectorDbExtension is enabled
  adminUser: ""
  adminPassword: ""
  existingSecret: ""
  ssl: true
  sslRootCert: ""
  # SSL certificate for the external database to ensure ssl connection, for example:
  # sslRootCert: |
  #   -----BEGIN CERTIFICATE-----
  #   ...
  #   -----END CERTIFICATE-----

## SeaweedFS chart configuration
## ref: https://github.com/seaweedfs/seaweedfs/tree/master/k8s/charts/seaweedfs
## @param seaweedfs.enabled Switch to enable or disable the SeaweedFS helm chart
## @param seaweedfs.auth.existingSecret must have keys "accessKeyId" and "accessKeySecret"
seaweedfs:
  global:
    createClusterRole: false
  enabled: true
  image:
    registry: mirror.gcr.io
    repository: chrislusf
  bucket: "adk-files"
  auth:
    admin:
      accessKeyID: "adk-admin-user"
      accessKeySecret: "adk-admin-password"
    existingSecret: ""
  affinity: ""
  master:
    enabled: false
  volume:
    enabled: false
  filer:
    enabled: false
  sftp:
    enabled: false

  ## @param s3.existingConfigSecret must be configured together with auth.admin.existingSecret, but it has
  ##   a different format, see s3 configuration:
  ##   https://github.com/seaweedfs/seaweedfs/tree/master/k8s/charts/seaweedfs#s3-configuration
  s3:
    port: 9009
    enableAuth: true
    existingConfigSecret: adk-seaweedfs-default-config-secret

  allInOne:
    nodeSelector: ""
    enabled: true
    s3:
      enabled: true
    sftp:
      enabled: false
    data:
      type: "persistentVolumeClaim"
      size: "20Gi"

## @section External S3 parameters
## All of these values are only used when redis.enabled is set to false
## @param externalS3.host External S3 host
## @param externalS3.port External S3 port number
## @param externalS3.accessKeyID External S3 access key ID
## @param externalS3.accessKeySecret External S3 access key secret
## @param externalS3.existingSecret Name of an existing secret resource containing the S3 credentials
## @param externalS3.protocol External S3 protocol
## @param externalS3.bucket External S3 bucket
## @param externalS3.region External S3 region
##
externalS3:
  host: ""
  port: 443
  accessKeyID: ""
  accessKeySecret: ""
  existingSecret: ""
  protocol: "https"
  bucket: "adk-files"
  region: "us-east-1"

## Redis chart configuration
## ref: https://github.com/CloudPirates-io/helm-charts/tree/main/charts/redis
## @param redis.enabled Switch to enable or disable the Redis helm chart
## @param redis.auth.password Redis password
## @param redis.auth.existingSecret Name of existing secret to use for Redis credentials
## @param redis.auth.existingSecretPasswordKey Key in existing secret to use for Redis password
##
redis:
  enabled: false
  fullnameOverride: "redis"
  image:
    registry: mirror.gcr.io
    repository: redis
  architecture: standalone
  auth:
    enabled: true
    password: "redis-password"
    existingSecret: ""
    existingSecretPasswordKey: ""
  containerSecurityContext:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL
    seccompProfile:
      type: RuntimeDefault
  podSecurityContext:
    runAsNonRoot: true
  master:
    persistence:
      enabled: false
  replica:
    replicaCount: 1
    persistence:
      enabled: false

## External Redis configuration
## All of these values are only used when redis.enabled is set to false
## @param externalRedis.host Redis host
## @param externalRedis.port Redis port number
## @param externalRedis.password Redis password
## @param externalRedis.existingSecret Name of an existing secret resource containing the Redis credentials
## @param externalRedis.existingSecretPasswordKey Name of an existing secret key containing the Redis password
##
externalRedis:
  host: ""
  port: 6379
  password: ""
  existingSecret: ""
  existingSecretPasswordKey: "redis-password"

docling:
  enabled: false
  podAnnotations: {}
  podSecurityContext: {}
  podLabels: {}
  resources: {}
  livenessProbe: {}
  # Unfortunately, docling does not handle IO properly and does not respond to health requests while processing file
  #    httpGet:
  #      path: /health
  #      port: http
  readinessProbe:
    initialDelaySeconds: 2
    timeoutSeconds: 5
    failureThreshold: 30
    periodSeconds: 2
    httpGet:
      path: /health
      port: http
  ui:
    enabled: true
  service:
    port: 15001
    type: ClusterIP
  maxSyncWait: 300 # 5 minutes in seconds
  imagePullPolicy: IfNotPresent
  image: "ghcr.io/docling-project/docling-serve-cpu:v1.14.0@sha256:65656d843de0c405debf43f09b85a5d228e0fb97d4040a387392f94c97d9a44f"

# This is to override the chart name.
nameOverride: ""
fullnameOverride: ""

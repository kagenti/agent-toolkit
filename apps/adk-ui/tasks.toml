# check

["adk-ui:check"]
depends = ["adk-ui:check:*"]

["adk-ui:check:prettier"]
run = "pnpm prettier --log-level silent --check src"
sources = ["src/**/*.js", "src/**/*.jsx", "src/**/*.ts", "src/**/*.tsx", "src/**/*.html", "src/**/*.css", "src/**/*.scss"]
outputs = { auto = true }
depends = ["common:setup:pnpm"]
dir = "{{config_root}}/apps/adk-ui"

["adk-ui:check:eslint"]
run = "pnpm eslint ."
sources = ["src/**/*.js", "src/**/*.jsx", "src/**/*.ts", "src/**/*.tsx"]
outputs = { auto = true }
depends = ["common:setup:pnpm"]
dir = "{{config_root}}/apps/adk-ui"

["adk-ui:check:tsc"]
run = "pnpm tsc --noEmit -p tsconfig.check.json"
sources = ["src/**/*.ts", "src/**/*.tsx"]
outputs = { auto = true }
depends = ["common:setup:pnpm", "adk-ts:build"]
dir = "{{config_root}}/apps/adk-ui"

["adk-ui:check:stylelint"]
run = 'pnpm stylelint --fix "src/**/*.{css,scss}"'
sources = ["src/**/*.css", "src/**/*.scss"]
outputs = { auto = true }
depends = ["common:setup:pnpm"]
dir = "{{config_root}}/apps/adk-ui"

["adk-ui:check:hadolint"]
run = "hadolint --ignore DL3018 Dockerfile"
sources = ["Dockerfile"]
outputs = { auto = true }
dir = "{{config_root}}/apps/adk-ui"

# fix

["adk-ui:fix"]
depends = ["adk-ui:fix:*"]

["adk-ui:fix:prettier"]
run = "pnpm prettier --log-level silent --write src"
sources = ["src/**/*.js", "src/**/*.jsx", "src/**/*.ts", "src/**/*.tsx", "src/**/*.html", "src/**/*.css", "src/**/*.scss"]
outputs = { auto = true }
depends = ["common:setup:pnpm"]
dir = "{{config_root}}/apps/adk-ui"

["adk-ui:fix:next"]
run = "pnpm eslint . --fix"
sources = ["src/**/*.js", "src/**/*.jsx", "src/**/*.ts", "src/**/*.tsx"]
outputs = { auto = true }
depends = ["common:setup:pnpm"]
dir = "{{config_root}}/apps/adk-ui"

["adk-ui:fix:stylelint"]
run = "pnpm stylelint --fix=lax \"src/**/*.css\" \"src/**/*.scss\""
sources = ["src/**/*.css", "src/**/*.scss"]
outputs = { auto = true }
depends = ["common:setup:pnpm"]
dir = "{{config_root}}/apps/adk-ui"

# run

["adk-ui:run"]
depends = ["adk-ui:build:nextjs"]
env.NODE_OPTIONS = "--no-experimental-global-navigator"
dir = "{{config_root}}/apps/adk-ui"
run = "pnpm next start"

["adk-ui:run:dev"]
depends = ["common:setup:pnpm", "adk-ts:build"]
env.NODE_OPTIONS = "--no-experimental-global-navigator"
dir = "{{config_root}}/apps/adk-ui"
# Using --webpack because Turbopack doesn't yet support some required features (e.g. the ::highlight() CSS rule).
run = "pnpm next dev --webpack"

# build

["adk-ui:build"]
depends = ["adk-ui:build:*"]
dir = "{{config_root}}"
run = "docker build -t ghcr.io/kagenti/adk/adk-ui:local -f ./apps/adk-ui/Dockerfile --load ."

["adk-ui:build:nextjs"]
depends = ["common:setup:pnpm", "adk-ts:build"]
dir = "{{config_root}}/apps/adk-ui"
env.NODE_OPTIONS = "--no-experimental-global-navigator"
run = """
pnpm next build --webpack
# Remove broken symlinks in standalone output — they cause mise's task_source_checker to panic on stat()
find .next/standalone -type l ! -exec test -e {} \\; -delete 2>/dev/null || true
"""
sources = [
    "package.json",
    "next.config.ts",
    "tsconfig.json",
    "public/**/*",
    "src/**/*",
]
outputs = [".next/standalone/**/*"]

# schema

["adk-ui:schema:generate"]
dir = "{{config_root}}/apps/adk-ui"
run = "./scripts/generate-schema.sh http://adk-api.localtest.me:8080/api/v1/openapi.json ./src/api/schema.d.ts"

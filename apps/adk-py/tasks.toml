# setup

["adk-py:setup"]
run = "uv sync --all-extras --dev"
sources = ["uv.lock", "pyproject.toml"]
outputs = { auto = true }
dir = "{{config_root}}/apps/adk-py"

# check

["adk-py:check"]
depends = ["adk-py:check:*"]

["adk-py:check:ruff-check"]
run = "uv run ruff check --quiet"
sources = ["src/**/*.py"]
outputs = { auto = true }
depends = ["adk-py:setup"]
dir = "{{config_root}}/apps/adk-py"

["adk-py:check:ruff-format"]
run = "uv run ruff format --quiet --check"
sources = ["src/**/*.py"]
outputs = { auto = true }
depends = ["adk-py:setup"]
dir = "{{config_root}}/apps/adk-py"

["adk-py:check:pyrefly"]
run = "uv run pyrefly check src"
sources = ["src/**/*.py"]
outputs = { auto = true }
dir = "{{config_root}}/apps/adk-py"

["adk-py:check:pytest-marks"]
run = """
#!/bin/bash
unmarked_tests=$(uv run pytest --collect-only --no-header --no-summary -q -m "not (unit or integration or e2e)" tests/ 2>/dev/null)
if echo "$unmarked_tests" | grep "tests collected" | grep -qv "no tests collected"; then
    echo "ERROR: Found tests without required pytest marks:\n"
    echo "$unmarked_tests" | grep 'tests collected'
    echo ""
    echo "All tests must be marked with @pytest.mark.unit, @pytest.mark.integration, or @pytest.mark.e2e"
    exit 1
else
    echo "✓ All tests have pytest marks"
fi
"""
sources = ["tests/**/*.py"]
outputs = { auto = true }
depends = ["adk-py:setup"]
dir = "{{config_root}}/apps/adk-py"

# fix

["adk-py:fix"]
depends = ["adk-py:fix:*"]

["adk-py:fix:ruff-check"]
run = "uv run ruff check --quiet --fix"
sources = ["src/**/*.py"]
outputs = { auto = true }
depends = ["adk-py:setup"]
dir = "{{config_root}}/apps/adk-py"

["adk-py:fix:ruff-format"]
run = "uv run ruff format --quiet"
sources = ["src/**/*.py"]
outputs = { auto = true }
depends = ["adk-py:setup"]
dir = "{{config_root}}/apps/adk-py"

# test

["adk-py:test-all"]
depends = ["adk-py:setup"]
dir = "{{config_root}}/apps/adk-py"
usage = 'flag "--python <python>" default="3.14"'
run = """
#!/bin/bash
uv run --python="${usage_python?}" pytest
"""

# build

["adk-py:build"]
depends = ["adk-py:setup"]
dir = "{{config_root}}/apps/adk-py"
sources = ["pyproject.toml", "uv.lock", "src/**/*.py"]
outputs = ["dist/*"]
run = "rm ./dist/* 2>/dev/null || true; uv build --out-dir dist"

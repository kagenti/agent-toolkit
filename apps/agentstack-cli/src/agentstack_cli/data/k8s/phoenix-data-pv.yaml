apiVersion: v1
kind: PersistentVolume
metadata:
  name: phoenix-data-pv
spec:
  capacity:
    storage: 8Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  hostPath:
    path: /phoenix-data
    type: Directory
  claimRef:
    namespace: kagenti-system
    name: phoenix-phoenix-0

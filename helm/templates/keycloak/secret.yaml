{{- if .Values.auth.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-secret
  labels:
    app: keycloak
    {{- include "agentstack.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- $adminPassword := "" }}
  {{- if .Values.auth.keycloakProvisionJob.adminPassword }}
    {{- $adminPassword = .Values.auth.keycloakProvisionJob.adminPassword }}
  {{- else }}
    {{- $secret := (lookup "v1" "Secret" .Release.Namespace "keycloak-secret") }}
    {{- if and $secret $secret.data }}
      {{- $adminPassword = index $secret.data "admin-password" | b64dec }}
    {{- else }}
      {{- $adminPassword = randAlphaNum 32 }}
    {{- end }}
  {{- end }}
  admin-password: {{ $adminPassword | quote }}
{{- end }}

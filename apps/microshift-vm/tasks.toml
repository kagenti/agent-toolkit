# build

["microshift-vm:build"]
dir = "{{config_root}}/apps/microshift-vm"
usage = '''
flag "--arch <arch>" {
  choices "x86_64" "aarch64"
}
'''
run = '''
#!/bin/bash
set -euxo pipefail

if [ -f /etc/adk ]; then
  echo "Running inside VM, image not needed."
  exit 0
fi

ARCH=${usage_arch:-$(uname -m | sed -e 's/arm64/aarch64/;s/amd64/x86_64/')}
DIST_DIR="./dist/$ARCH"

SRC_HASH=$(fd -t f . | LC_ALL=C sort | xargs cat | sha256sum)

if test "$(cat "$DIST_DIR/src-hash.txt" 2>/dev/null)" == "$SRC_HASH"; then
  echo "Source files hash matches, skipping build for $ARCH."
  exit 0
fi

rm -rf "$DIST_DIR"

if [ "$(uname)" = "Darwin" ]; then
  ACCELERATOR="hvf"
  BREW_PREFIX=$(brew --prefix)
  if [ "$ARCH" = "x86_64" ]; then
    EFI_CODE="$BREW_PREFIX/share/qemu/edk2-x86_64-code.fd"
    EFI_VARS="$BREW_PREFIX/share/qemu/edk2-i386-vars.fd"
  else
    EFI_CODE="$BREW_PREFIX/share/qemu/edk2-aarch64-code.fd"
    EFI_VARS="$BREW_PREFIX/share/qemu/edk2-arm-vars.fd"
  fi
else
  [ -w /dev/kvm ] && ACCELERATOR="kvm" || ACCELERATOR="tcg"
  if [ "$ARCH" = "x86_64" ]; then
    EFI_CODE="/usr/share/OVMF/OVMF_CODE_4M.fd"
    [ -f "$EFI_CODE" ] || EFI_CODE="/usr/share/OVMF/OVMF_CODE.fd"
    EFI_VARS="/usr/share/OVMF/OVMF_VARS_4M.fd"
    [ -f "$EFI_VARS" ] || EFI_VARS="/usr/share/OVMF/OVMF_VARS.fd"
  else
    EFI_CODE="/usr/share/AAVMF/AAVMF_CODE.fd"
    [ -f "$EFI_CODE" ] || EFI_CODE="/usr/share/qemu-efi-aarch64/QEMU_EFI.fd"
    EFI_VARS="/usr/share/AAVMF/AAVMF_VARS.fd"
    [ -f "$EFI_VARS" ] || EFI_VARS="/usr/share/qemu-efi-aarch64/vars-template-pflash.raw"
  fi
fi

if [ ! -f "$EFI_CODE" ]; then
  echo "ERROR: EFI firmware not found at $EFI_CODE" >&2
  exit 1
fi

PACKER_LOG=1 packer init .
PACKER_LOG=1 packer build \
  -var "arch=$ARCH" \
  -var "output_dir=./dist" \
  -var "efi_code=$EFI_CODE" \
  -var "efi_vars=$EFI_VARS" \
  -var "accelerator=$ACCELERATOR" \
  microshift.pkr.hcl

echo "$SRC_HASH" > "$DIST_DIR/src-hash.txt"
'''
sources = ["microshift.pkr.hcl", "cloud-init/*", "rootfs/**/*", "install.sh", "wsl/*"]
outputs = ["dist/**/*.qcow2", "dist/**/*.wsl", "dist/**/*.incus.tar.gz"]
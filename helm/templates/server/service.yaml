apiVersion: v1
kind: Service
metadata:
  name: adk-server-svc
  labels:
    app: adk-server
    {{- include "kagenti-adk.labels" . | nindent 4 }}
spec:
  type: {{ .Values.server.service.type }}
  ports:
    - port: {{ .Values.server.service.port }}
      targetPort: http
      protocol: TCP
      name: http
      {{- if (eq .Values.server.service.type "NodePort") }}
      nodePort: {{ .Values.server.service.nodePort }}
      {{- end }}
  selector:
    app: adk-server
    {{- include "kagenti-adk.selectorLabels" . | nindent 4 }}

# setup

["adk-server:setup"]
extends = "python:setup"
depends = ["adk-py:setup"]
dir = "{{config_root}}/apps/adk-server"

# check
["adk-server:test"]
depends = ["adk-server:test:unit"]

["adk-server:check"]
depends = ["adk-server:check:*"]

["adk-server:check:pytest-marks"]
extends = "python:check:pytest-marks"
depends = ["adk-server:setup"]
dir = "{{config_root}}/apps/adk-server"

["adk-server:check:ruff-check"]
extends = "python:check:ruff"
depends = ["adk-server:setup"]
dir = "{{config_root}}/apps/adk-server"

["adk-server:check:ruff-format"]
extends = "python:check:ruff-format"
depends = ["adk-server:setup"]
dir = "{{config_root}}/apps/adk-server"

["adk-server:check:pyrefly"]
extends = "python:check:pyrefly"
depends = ["adk-server:setup"]
dir = "{{config_root}}/apps/adk-server"

["adk-server:check:hadolint"]
extends = "docker:check:hadolint"
dir = "{{config_root}}/apps/adk-server"

